name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          xcodebuild -project PiecesOfPaper.xcodeproj \
            -scheme PiecesOfPaper \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            test
